<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin"></ion-back-button>
    </ion-buttons>
    <ion-title>Termini</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <h3>Dodaj novi termin</h3>

  <ion-item>
    <ion-label position="floating">Datum</ion-label>
    <ion-input type="date" [(ngModel)]="date"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Vrijeme</ion-label>
    <ion-input type="time" [(ngModel)]="time"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Max gostiju</ion-label>
    <ion-input type="number" [(ngModel)]="maxGuests"></ion-input>
  </ion-item>

  <ion-button expand="block" (click)="onAdd()" class="ion-margin-top"
    [disabled]="!date || !time">
    <ion-icon name="add" slot="start"></ion-icon>
    Dodaj termin
  </ion-button>

  <h3>Postojeći termini</h3>

  @if(timeslots.length === 0) {
    <p class="ion-text-center">Nema termina.</p>
  }

  <ion-list>
    @for(slot of timeslots; track slot.id) {
      <ion-item>
        <ion-label>
          <h2>{{ slot.date }} u {{ slot.time }}</h2>
          <p>Max gostiju: {{ slot.maxGuests }}</p>
        </ion-label>
        <ion-button slot="end" color="danger" fill="clear"
          (click)="onDelete(slot.id!)">
          <ion-icon name="trash"></ion-icon>
        </ion-button>
      </ion-item>
    }
  </ion-list>
</ion-content>
