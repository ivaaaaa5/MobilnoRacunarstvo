<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Moje rezervacije</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if(reservations.length === 0) {
    <p class="ion-text-center">Nemate aktivnih rezervacija.</p>
  }

  <ion-list>
    @for(r of reservations; track r.id) {
      <ion-item>
        <ion-icon name="calendar" slot="start" color="primary"></ion-icon>
        <ion-label>
          <h2>{{ r.date }} u {{ r.time }}</h2>
          <p>Broj osoba: {{ r.numberOfGuests }}</p>
          <p>Status: <ion-badge [color]="r.status === 'confirmed' ? 'success' : 'warning'">
            {{ r.status }}
          </ion-badge></p>
        </ion-label>
        @if(canCancel(r)) {
          <ion-button slot="end" color="danger" fill="clear"
            (click)="onCancel(r.id!)">
            <ion-icon name="trash"></ion-icon>
          </ion-button>
        }
      </ion-item>
    }
  </ion-list>
</ion-content>
